<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Concert New Generation Choir & Cantabile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fdf6ee;
      --surface: #fff9f2;
      --accent: #d45f8a;
      --accent2: #7dbe8a;
      --text: #2e2018;
      --muted: #9e8878;
      --border: rgba(180,120,90,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 16px 20px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #fff0f5 0%, #f0faef 100%);
      box-shadow: 0 2px 12px rgba(212,95,138,0.08);
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #d45f8a, #e8856a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(212,95,138,0.3);
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.2px;
      line-height: 1.2;
      color: var(--text);
    }

    .header-text h1 span {
      color: var(--accent);
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .legend {
      display: flex;
      gap: 7px;
      padding: 10px 16px;
      overflow-x: auto;
      background: #fff8f0;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .legend::-webkit-scrollbar { display: none; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 500;
      white-space: nowrap;
      background: white;
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 20px;
      color: var(--text);
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .map-wrapper {
      flex: 1;
      position: relative;
      min-height: 400px;
      overflow: hidden;
    }

    .map-wrapper iframe {
      width: 100%;
      height: calc(100% + 50px);
      position: absolute;
      top: -50px;
      left: 0;
      border: none;
      display: block;
    }

    footer {
      padding: 10px 16px;
      background: linear-gradient(135deg, #fff0f5 0%, #f0faef 100%);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    footer span {
      font-size: 11px;
      color: var(--muted);
    }

    .open-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #d45f8a, #e8856a);
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 3px 10px rgba(212,95,138,0.3);
    }

    @media (min-width: 600px) {
      header { padding: 20px 28px; }
      .header-text h1 { font-size: 19px; }
      .legend { padding: 12px 24px; gap: 10px; }
      .legend-item { font-size: 13px; padding: 6px 14px; }
      footer { padding: 12px 24px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-icon">🎵</div>
    <div class="header-text">
      <h1>Concert <span>Cantabile & New Generation Choir</span></h1>
      <p>Mapa de la zona</p>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item"><span class="dot" style="background:#e53935"></span> El Cercle: Assagi i Concert</div>
    <div class="legend-item"><span class="dot" style="background:#A9A825"></span> Dinar: punt de trobada</div>
    <div class="legend-item"><span class="dot" style="background:#FFD600"></span> Carrer tallat, espai per a vianants</div>
    <div class="legend-item"><span class="dot" style="background:#1e88e5"></span> Zona blava</div>
    <div class="legend-item"><span class="dot" style="background:#757575"></span> Zona càrrega i descàrrega</div>
    <div class="legend-item"><span class="dot" style="background:#43a047"></span> Menjar per emportar</div    
    <div class="legend-item"><span class="dot" style="background:#097138"></span> Supermercats</div>
    

  </div>

  <div class="map-wrapper">
    <iframe
      src="https://www.google.com/maps/d/embed?mid=1w6v3yMUSgQB5C4wG7lPBRrvL31jdkUk&ehbc=2E312F"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <footer>
    <span>📍 Toca un punt per veure detalls</span>
    <a class="open-btn" href="https://www.google.com/maps/d/viewer?mid=1w6v3yMUSgQB5C4wG7lPBRrvL31jdkUk" target="_blank">
      Obrir ↗
    </a>
  </footer>

</body>
</html>
